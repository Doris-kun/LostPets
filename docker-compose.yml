version: '3.8'

services:
  backend:
    build: ./back-end
    ports:
      - "3000:3000"
    env_file:
      - ./back-end/.env
    restart: unless-stopped

  frontend:
    build:
      context: ./front-end
      args:
        VUE_APP_API_URL: http://localhost:3000
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
